name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        shell: pwsh
        run: dotnet test AA.Annotate.slnx -v minimal

      - name: Package
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          .\scripts\package-win.ps1 -Version $version

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $asset = "artifacts\dist\aa-annotate-$version-win-x64.zip"
          $notes = "docs\release-notes\$tag.md"
          if (-not (Test-Path -LiteralPath $notes)) {
            $notes = "docs\release-notes\v0.1.0.md"
          }

          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          gh release view $tag --repo '${{ github.repository }}' *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = $previousErrorActionPreference

          if ($releaseExists) {
            gh release upload $tag $asset `
              --repo '${{ github.repository }}' `
              --clobber
          }
          else {
            gh release create $tag $asset `
              --repo '${{ github.repository }}' `
              --title "AA Annotate $tag" `
              --notes-file $notes `
              --verify-tag
          }
